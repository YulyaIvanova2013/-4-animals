<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animals Grammar — mobile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fredoka', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.32) 0, transparent 18%),
        radial-gradient(circle at 82% 10%, rgba(255,255,255,0.28) 0, transparent 20%),
        radial-gradient(circle at 85% 78%, rgba(255,255,255,0.22) 0, transparent 18%),
        linear-gradient(135deg, #ffb6d9 0%, #ffd36e 34%, #a7f3d0 68%, #8fd3ff 100%);
      min-height: 100vh;
      color: #4a3354;
      padding: 18px;
      overflow-x: hidden;
    }

    .floaty {
      position: fixed;
      font-size: 2.2rem;
      opacity: 0.18;
      pointer-events: none;
      animation: floatUp 16s linear infinite;
      z-index: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      12% { opacity: 0.18; }
      88% { opacity: 0.18; }
      100% { transform: translateY(-140px) rotate(360deg); opacity: 0; }
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .panel {
      background: rgba(255,255,255,0.94);
      border: 4px solid rgba(255,255,255,0.7);
      border-radius: 30px;
      box-shadow: 0 16px 40px rgba(86, 53, 92, 0.16);
      backdrop-filter: blur(8px);
    }

    header {
      padding: 28px 22px;
      text-align: center;
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 2.2rem;
      line-height: 1.05;
      color: #ff5ca8;
      text-shadow: 0 2px 0 #fff;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 1.06rem;
      font-weight: 600;
      color: #6f5682;
    }

    .badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    .badge.pink { background: linear-gradient(135deg, #ff72b6, #ff5f6d); }
    .badge.orange { background: linear-gradient(135deg, #ffb347, #ff7b54); }
    .badge.green { background: linear-gradient(135deg, #34d399, #10b981); }

    .progress-shell {
      padding: 0 4px;
      margin-bottom: 16px;
    }

    .progress-track {
      height: 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      border: 3px solid rgba(255,255,255,0.85);
      overflow: hidden;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff72b6, #ffb347, #34d399, #60a5fa);
      transition: width .35s ease;
    }

    .selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .variant-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 12px 18px;
      border-radius: 999px;
      color: #7a4f7a;
      background: linear-gradient(135deg, #fff7fb, #fff4cf);
      box-shadow: inset 0 0 0 3px #ffc0e3, 0 8px 16px rgba(0,0,0,0.07);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .variant-btn:hover,
    .variant-btn.active {
      transform: translateY(-2px);
      color: white;
      box-shadow: 0 10px 22px rgba(255,92,168,0.28);
      background: linear-gradient(135deg, #ff72b6, #ffb347);
    }

    section.main {
      padding: 24px;
      margin-bottom: 18px;
    }

    h2 {
      font-family: 'Baloo 2', cursive;
      color: #ff5ca8;
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .note {
      background: linear-gradient(135deg, #fff1f8, #fff8dc);
      border-left: 6px solid #ff8ec5;
      border-radius: 20px;
      padding: 18px;
      line-height: 1.6;
      font-weight: 600;
      color: #674d74;
      margin-bottom: 18px;
    }

    .task-box {
      background: linear-gradient(135deg, #ffffff, #fffaf1);
      border: 4px solid #ffe2f0;
      border-radius: 26px;
      padding: 24px;
      line-height: 2.4;
      font-size: 1.18rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
    }

    .task-box h3 {
      font-family: 'Baloo 2', cursive;
      text-align: center;
      color: #5a67d8;
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .gap-wrap {
      display: inline-flex;
      align-items: center;
      background: #fff;
      border: 3px solid #8ecbff;
      border-radius: 14px;
      padding: 6px 10px;
      margin: 0 3px;
      vertical-align: middle;
      transition: .2s ease;
    }

    .gap-wrap.correct {
      background: #defce9;
      border-color: #22c55e;
    }

    .gap-wrap.incorrect {
      background: #ffe1ea;
      border-color: #fb7185;
    }

    select {
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      color: #4b4061;
      max-width: 160px;
      padding: 4px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      border-radius: 999px;
      padding: 16px 20px;
      box-shadow: 0 10px 18px rgba(0,0,0,0.1);
      transition: transform .2s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn.check { background: linear-gradient(135deg, #34d399, #10b981); }
    .btn.reset { background: linear-gradient(135deg, #a78bfa, #818cf8); }
    .btn.show { background: linear-gradient(135deg, #ff9f43, #ff6b6b); }

    .feedback, .tips {
      display: none;
      margin-top: 18px;
      border-radius: 18px;
      padding: 16px 18px;
      font-weight: 700;
    }

    .feedback.show, .tips.show { display: block; }
    .feedback.success { background: #defce9; color: #166534; border: 3px solid #22c55e; }
    .feedback.warn { background: #fff4d9; color: #9a5800; border: 3px solid #f59e0b; }
    .feedback.error { background: #ffe1ea; color: #9f1239; border: 3px solid #fb7185; }

    .tips {
      background: linear-gradient(135deg, #eef9ff, #fff7dd);
      border-left: 6px solid #60a5fa;
    }

    .tip {
      margin-top: 10px;
      background: rgba(255,255,255,0.9);
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.55;
      color: #574b6d;
      font-weight: 600;
    }

    .result {
      display: none;
      text-align: center;
      padding: 28px 20px;
      background: linear-gradient(135deg, #34d399, #60a5fa);
      color: white;
      margin-bottom: 18px;
    }

    .result.show { display: block; }

    .result .emoji {
      font-size: 4.3rem;
      margin-bottom: 6px;
    }

    .result .score {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      margin: 10px 0;
    }

    .foot {
      text-align: center;
      padding: 14px 10px 4px;
      font-size: .96rem;
      color: #7b6286;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      header, .selector, section.main { padding-left: 14px; padding-right: 14px; }
      h1 { font-size: 2rem; }
      h2 { font-size: 1.65rem; }
      .task-box { padding: 18px; font-size: 1.05rem; line-height: 2.2; }
      .task-box h3 { font-size: 1.55rem; }
      select { max-width: 100%; font-size: 1rem; }
      .buttons { flex-direction: column; }
      .btn { width: 100%; }
      .result .score { font-size: 3rem; }
    }

    @media (max-width: 480px) {
      .gap-wrap {
        display: block;
        width: 100%;
        margin: 8px 0;
      }

      select {
        width: 100%;
        max-width: 100%;
      }

      .buttons {
        position: sticky;
        bottom: 10px;
        background: rgba(255,255,255,0.92);
        padding: 10px;
        border-radius: 20px;
      }

      .task-box {
        font-size: 1rem;
        line-height: 2.15;
      }
    }
  </style>
</head>
<body>
  <div class="floaty" style="left:8%; animation-delay:0s;">🐾</div>
  <div class="floaty" style="left:22%; animation-delay:3s;">🐹</div>
  <div class="floaty" style="left:39%; animation-delay:6s;">🐱</div>
  <div class="floaty" style="left:57%; animation-delay:9s;">🐭</div>
  <div class="floaty" style="left:74%; animation-delay:12s;">🧀</div>
  <div class="floaty" style="left:90%; animation-delay:15s;">🌟</div>

  <div class="wrap">
    <header class="panel">
      <h1>🐾 Animals Grammar 🐾</h1>
          </header>

    <div class="progress-shell">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="selector panel" id="selector"></div>

    <div class="result panel" id="resultBox">
      <div class="emoji">🌈</div>
      <div style="font-family:'Baloo 2', cursive; font-size:2rem;">Great job!</div>
      <div class="score" id="scoreText">0/6</div>
      <div id="scoreMessage" style="font-size:1.1rem; font-weight:700;">You did it!</div>
    </div>

    <section class="main panel">
      <h2>📝 Grammar task</h2>
      <div class="note">
        Прочитай текст и вставь вместо каждого пропуска <strong>A–F</strong> нужную грамматическую форму, выбрав её из трёх предложенных вариантов.
      </div>

      <div class="task-box" id="taskBox"></div>

      <div class="buttons">
        <button class="btn check" onclick="checkAnswers()">✓ Check</button>
        <button class="btn reset" onclick="resetAnswers()">↺ Reset</button>
        <button class="btn show" onclick="showAnswers()">👀 Show answers</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="tips" id="tips"></div>
    </section>

  </div>

  <script>
    const TASKS = [
      {
        id: 1,
        emoji: '🐹',
        title: 'My hamster',
        text: 'I A_____ got a hamster named Fluffy. Fluffy is small and very cute. He B_____ got soft, brown fur and tiny black eyes. Every day, I C_____ him seeds and carrots. Fluffy loves to run on his wheel. Sometimes, he hides in D_____ little house. I love watching him play! He E_____ small and furry. He likes to run on his wheel. Fluffy also eats apples and drinks water. I clean his cage twice a week. Fluffy loves to play with me. He is my F_____ friend!',
        options: {
          A: ['has', 'have', 'am'],
          B: ['is', 'has', 'have'],
          C: ['will feed', 'feeds', 'feed'],
          D: ['his', 'he', 'him'],
          E: ['is', 'am', 'are'],
          F: ['worse', 'better', 'best']
        },
        answers: { A:'2', B:'2', C:'3', D:'1', E:'1', F:'3' },
        explanations: {
          A: 'С I пишем have got.',
          B: 'С he пишем has got.',
          C: 'Every day показывает регулярное действие, поэтому feed.',
          D: 'Перед little house нужно притяжательное местоимение his.',
          E: 'He is small and furry — с he ставим is.',
          F: 'После my подходит best friend — «лучший друг». '
        }
      },
      {
        id: 2,
        emoji: '🐱',
        title: 'My kitten',
        text: 'I A_____ got a kitten. Her name is Lucy. Lucy is very small and very fluffy. She has got soft, white fur and big, bright blue eyes. Lucy B_____ to play with a ball of wool. She runs around the house and sometimes C_____ under the sofa. It is funny when she jumps out and tries to catch D_____ toes! Every morning, Lucy has her breakfast. She E_____ little biscuits made for kittens. Lucy drinks water from F_____ small bowl.',
        options: {
          A: ['will have', 'has', 'have'],
          B: ['like', 'likes', 'liked'],
          C: ['hides', 'hide', 'will hide'],
          D: ['my', 'me', 'mine'],
          E: ['eats', 'eat', 'ate'],
          F: ['—', 'a', 'an']
        },
        answers: { A:'3', B:'2', C:'1', D:'1', E:'1', F:'2' },
        explanations: {
          A: 'I have got a kitten — с I нужна форма have.',
          B: 'Lucy likes — с 3 лицом ед. числа добавляем -s.',
          C: 'Sometimes + обычное действие, поэтому hides.',
          D: 'Нужно my toes — притяжательное местоимение.',
          E: 'She eats — с she в Present Simple добавляем -s.',
          F: 'Перед small bowl нужен артикль a.'
        }
      },
      {
        id: 3,
        emoji: '🐀',
        title: 'Rats',
        text: 'Rats A_____ small animals. They B_____ long tails and sharp teeth. Rats can be different colours, like brown, grey, or black. They have small C_____ and ears. Rats live in D_____ places. They can E_____ in cities, farms, or the countryside. They like to be near people and food. Rats are very clever.',
        options: {
          A: ['are', 'is', 'have'],
          B: ['can', 'are', 'have'],
          C: ['eyes', 'eye', 'eyez'],
          D: ['a', 'much', 'many'],
          E: ['lives', 'live', 'to live']
        },
        answers: { A:'1', B:'3', C:'1', D:'3', E:'2' },
        explanations: {
          A: 'Rats — множественное число, поэтому are.',
          B: 'They have long tails — нужен глагол have.',
          C: 'После small нужен множественный вариант eyes.',
          D: 'Places — исчисляемое множественное число, поэтому many.',
          E: 'После can используется начальная форма: live.'
        }
      },
      {
        id: 4,
        emoji: '🐭',
        title: 'Mice',
        text: 'A_____ are small animals. They B_____ very tiny and have soft fur. Mice have long tails and big ears. They come in many colours, like grey, brown, and white. Mice C_____ in fields, forests, and sometimes in houses. D_____ like to eat grains, fruits, and cheese. Mice are active E_____ night. They run fast and are very quiet.',
        options: {
          A: ['mice', 'mouse', 'mouses'],
          B: ['can', 'are', 'have'],
          C: ['living', 'lives', 'live'],
          D: ['They', 'Their', 'Them'],
          E: ['at', 'on', 'in']
        },
        answers: { A:'1', B:'2', C:'3', D:'1', E:'1' },
        explanations: {
          A: 'Во множественном числе правильно mice.',
          B: 'They are very tiny — нужна форма are.',
          C: 'Mice live — множественное число и обычное действие.',
          D: 'В начале предложения нужен субъект They.',
          E: 'Устойчивое выражение: at night.'
        }
      }
    ];

    let currentId = 1;

    function getTask() {
      return TASKS.find(t => t.id === currentId);
    }

    function renderSelector() {
      const box = document.getElementById('selector');
      box.innerHTML = '';
      TASKS.forEach(task => {
        const btn = document.createElement('button');
        btn.className = 'variant-btn' + (task.id === currentId ? ' active' : '');
        btn.textContent = `${task.emoji} Variant ${task.id}`;
        btn.onclick = () => {
          currentId = task.id;
          renderSelector();
          loadTask();
        };
        box.appendChild(btn);
      });
    }

    function gapSelect(taskId, gap, options) {
      const opts = options.map((item, i) => `<option value="${i+1}">${i+1}) ${item}</option>`).join('');
      return `<span class="gap-wrap"><select id="gap-${taskId}-${gap}"><option value="">${gap}: choose</option>${opts}</select></span>`;
    }

    function loadTask() {
      const task = getTask();
      let html = task.text;
      Object.keys(task.options).forEach(gap => {
        html = html.replace(`${gap}_____`, gapSelect(task.id, gap, task.options[gap]));
      });
      document.getElementById('taskBox').innerHTML = `<h3>${task.emoji} ${task.title}</h3>${html}`;
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').textContent = '';
      document.getElementById('tips').className = 'tips';
      document.getElementById('tips').innerHTML = '';
      document.getElementById('resultBox').classList.remove('show');
      setProgress(0);
    }

    function setProgress(value) {
      document.getElementById('progressBar').style.width = value + '%';
    }

    function checkAnswers() {
      const task = getTask();
      const gaps = Object.keys(task.answers);
      let correct = 0;
      let answered = false;
      let tips = '<strong>💡 Объяснения:</strong>';

      gaps.forEach(gap => {
        const select = document.getElementById(`gap-${task.id}-${gap}`);
        const wrap = select.parentElement;
        wrap.classList.remove('correct', 'incorrect');
        if (select.value) answered = true;

        if (select.value === task.answers[gap]) {
          correct++;
          wrap.classList.add('correct');
        } else if (select.value) {
          wrap.classList.add('incorrect');
          tips += `<div class="tip"><strong>${gap}.</strong> Правильный ответ: <em>${task.options[gap][Number(task.answers[gap]) - 1]}</em>.<br>${task.explanations[gap]}</div>`;
        }
      });

      const feedback = document.getElementById('feedback');
      const tipsBox = document.getElementById('tips');

      if (!answered) {
        feedback.textContent = 'Сначала выбери ответы.';
        feedback.className = 'feedback show error';
        return;
      }

      const total = gaps.length;
      const percent = Math.round((correct / total) * 100);
      setProgress(percent);

      if (correct === total) {
        feedback.textContent = '✅ Perfect! Всё верно!';
        feedback.className = 'feedback show success';
        document.getElementById('scoreText').textContent = `${correct}/${total}`;
        document.getElementById('scoreMessage').textContent = 'Super star result!';
        document.getElementById('resultBox').classList.add('show');
      } else if (correct >= Math.ceil(total * 0.6)) {
        feedback.textContent = `👍 Правильно ${correct} из ${total}. Уже хорошо!`;
        feedback.className = 'feedback show warn';
        tipsBox.innerHTML = tips;
        tipsBox.className = 'tips show';
      } else {
        feedback.textContent = `💡 Правильно ${correct} из ${total}. Попробуй ещё раз.`;
        feedback.className = 'feedback show error';
        tipsBox.innerHTML = tips;
        tipsBox.className = 'tips show';
      }
    }

    function resetAnswers() {
      const task = getTask();
      Object.keys(task.answers).forEach(gap => {
        const select = document.getElementById(`gap-${task.id}-${gap}`);
        if (select) {
          select.value = '';
          select.parentElement.classList.remove('correct', 'incorrect');
        }
      });
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('feedback').textContent = '';
      document.getElementById('tips').className = 'tips';
      document.getElementById('tips').innerHTML = '';
      document.getElementById('resultBox').classList.remove('show');
      setProgress(0);
    }

    function showAnswers() {
      const task = getTask();
      Object.keys(task.answers).forEach(gap => {
        const select = document.getElementById(`gap-${task.id}-${gap}`);
        if (select) {
          select.value = task.answers[gap];
          select.parentElement.classList.remove('incorrect');
          select.parentElement.classList.add('correct');
        }
      });
      setProgress(100);
      const feedback = document.getElementById('feedback');
      feedback.textContent = '👀 Правильные ответы показаны.';
      feedback.className = 'feedback show success';
      document.getElementById('tips').className = 'tips';
      document.getElementById('tips').innerHTML = '';
    }

    renderSelector();
    loadTask();
  </script>
</body>
</html>
